<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
function doimau(mau){
    document.body.style.backgroundColor = mau;
}
</script>
Bạn hãy chọn màu nền: <br>
<input type="radio" name="mau" onclick="doimau('red')"> Đỏ <br>
<input type="radio" name="mau" onclick="doimau('blue')"> Xanh dương <br>
<input type="radio" name="mau" onclick="doimau('brown')"> Nâu <br>
<input type="radio" name="mau" onclick="doimau('lavender')"> Xanh nhạt <br>
</body>
</html>
