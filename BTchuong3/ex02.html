<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .m {
        width: 800px;
        margin: 50px auto;
        border: 3px solid black;
    }
    .a {
        font-size: 30px;
        font-weight: bold;
        text-align: center;
        color: red;
        background-color: aquamarine;
        padding: 20px;
    }
    .b {
        background-color: rgb(144, 127, 255);
        font-size: 20px;
    }
    .c {
        background-color: rgb(255, 127, 127);
        font-size: 20px;
    }
</style>
<body>
    <div class="m">
        <div class="a">QUÊ HƯƠNG</div>
        <div class="b">
            Quê hương là chùm khế ngọt<br>
            Cho con trèo hái mỗi ngày<br>
            Quê hương là đường đi học<br>
            Con về rợp bướm vàng bay<br>
        </div>
        <div class="c">
            Quê hương là con diều biếc<br>
            Bay cao trong gió cùng mây<br>
            Quê hương là con đò nhỏ<br>
            Đưa em qua sông mỗi chiều<br>
        </div>
    </div>
</body>
</html>
