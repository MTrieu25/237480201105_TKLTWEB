<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        .a {
            display: inline-block;
            width: 70px;
        }
</style>

</head>
<body>
    <script>
function Tinh(){
    var a = parseFloat(document.getElementById("so1").value);
    var b = parseFloat(document.getElementById("so2").value);
    var pt = document.getElementById("pheptinh").value;
    var kq;

    if(pt=="+") kq = a + b;
    if(pt=="-") kq = a - b;
    if(pt=="*") kq = a * b;
    if(pt=="/") kq = a / b;

    document.getElementById("ketqua").value = kq;
}
</script>
</head>
<body>

<span class="a">Số 1: </span>
    <input type="text" id="so1"><br><br>
<span class="a">Số 2: </span>
    <input type="text" id="so2"><br><br>

Phép tính:
<select id="pheptinh">
<option value="+">Cộng</option>
<option value="-">Trừ</option>
<option value="*">Nhân</option>
<option value="/">Chia</option>
</select>

<br><br>

<span class="a">Kết quả: </span>
    <input type="text" id="ketqua" readonly><br><br>

<input type="button" value="Tính" onclick="Tinh()">

</body>
</html>
